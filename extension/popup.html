<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo-dot"></div>
      <span class="logo-text">WebChat</span>
    </div>
    <div class="header-right">
      <div id="status-badge" class="badge badge-idle">idle</div>
      <button id="btn-rescan" class="icon-btn" title="Re-scan this page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Page info bar -->
  <div id="page-bar" class="page-bar">
    <span id="page-title" class="page-title">Scanning page…</span>
  </div>

  <!-- Messages -->
  <main id="messages" class="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M11 8v6"/><path d="M8 11h6"/>
        </svg>
      </div>
      <p class="empty-title">Ask anything about this page</p>
      <p class="empty-sub">Summaries, facts, explanations — just ask.</p>
    </div>
  </main>

  <!-- Input area -->
  <footer class="input-area">
    <div class="input-row">
      <textarea
        id="input"
        class="input"
        placeholder="Ask a question…"
        rows="1"
        maxlength="500"
      ></textarea>
      <button id="btn-send" class="send-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5"/><path d="m5 12 7-7 7 7"/>
        </svg>
      </button>
    </div>
    <div class="input-hint" id="input-hint">Loading page…</div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
